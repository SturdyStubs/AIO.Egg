name: Update Version and Create Release

on:
  push:
    branches:
      - beta
      - staging
      - production

jobs:
  update-version:
    runs-on: ubuntu-latest

    steps:
    - name: Checkout code
      uses: actions/checkout@v3

    - name: Set up Python
      uses: actions/setup-python@v4
      with:
        python-version: '3.x'

    - name: Update Version
      id: update_version
      run: |
        branch=$(echo "${{ github.ref }}" | sed 's|refs/heads/||')
        new_version=$(python .github/scripts/update_version.py $branch)
        echo "new_version=$new_version" >> $GITHUB_ENV

    - name: Commit and Push Changes
      env:
        GITHUB_TOKEN: ${{ secrets.PERSONAL_ACTION_TOKEN }}
      run: |
        git config --global user.name 'github-actions[bot]'
        git config --global user.email 'github-actions[bot]@users.noreply.github.com'
        git add egg-rust--all-carbon-builds.json
        git commit -m "Update version to ${{ env.new_version }}"
        git push

    - name: Get previous tag
      id: prev_tag
      run: echo ::set-output name=tag::$(git describe --tags --abbrev=0)

    - name: Get list of commits since previous tag
      id: commit_list
      run: echo ::set-output name=commits::$(git log --pretty=format:"* %s" ${{ steps.prev_tag.outputs.tag }}..HEAD)

    - name: Create GitHub Release
      env:
        GITHUB_TOKEN: ${{ secrets.PERSONAL_ACTION_TOKEN }}
      run: |
        curl -X POST \
          -H "Authorization: token $PERSONAL_ACTION_TOKEN" \
          -H "Content-Type: application/json" \
          -d '{
            "tag_name": "${{ env.new_version }}",
            "target_commitish": "main",
            "name": "${{ env.new_version }}",
            "body": "${{ steps.commit_list.outputs.commits }}",
            "draft": false,
            "prerelease": false
          }' \
          https://api.github.com/repos/${{ github.repository }}/releases
